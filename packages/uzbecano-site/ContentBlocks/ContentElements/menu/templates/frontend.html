<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:uzbecanoSite="http://typo3.org/ns/Uzbecano/UzbecanoSite/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout/>

<f:section name="Header"/>

<f:section name="Main">

    <div class="container py-4">

        <div class="grid grid-cols-12">
            <div class="col-span-12 {f:if(condition: '{data.select_grid} == 12', then: 'lg:col-start-2 lg:col-end-12')}">
                <f:render partial="Header/Header" arguments="{
                header: data.header,
                layout: data.header_layout,
                positionClass: '{f:if(condition: data.header_position, then: \'ce-headline-{data.header_position}\')}',
                link: data.header_link,
                default: settings.defaultHeaderType,
                headerColor: headerColor,
                subheaderColor: subheaderColor}"

                />

                <div class="grid grid-cols-1 {f:if(condition: '{data.select_grid} != 12', then: 'xl:grid-cols-{data.select_grid}')} gap-4 grid-flow-row mt-4">
                    <f:for each="{data.items}" as="item">
                        <div class="flex flex-row  max-h-100">
                            <f:if condition="{item.image.0}">
                                <f:media class="h-40 w-40 {f:if(condition: '{item.sold_out} == 2', then: ' grayscale')}" file="{item.image.0}" width="200" height="200"/>
                            </f:if>
                            <div class="pl-4">
                                <f:if condition="{item.title}">
                                    <p class="text-xl lg:text-2xl font-normal uppercase text-start hyphens-auto hyphenate-limit min-h-12 mb-0">
                                        {item.title}
                                    </p>
                                </f:if>
                                <f:if condition="{item.price}">
                                    <p class="text-xl lg:text-2xl text-red-600 font-normal uppercase text-start hyphens-auto hyphenate-limit min-h-12 mb-0">
                                        {item.price}
                                    </p>
                                </f:if>
                                <f:if condition="{item.textarea}">
                                    <div class="text-start break-words hyphens-auto"><f:format.html >{item.textarea}</f:format.html></div>
                                </f:if>
                            </div>
                        </div>
                    </f:for>
                </div>
            </div>
        </div>
    </div>

</f:section>
