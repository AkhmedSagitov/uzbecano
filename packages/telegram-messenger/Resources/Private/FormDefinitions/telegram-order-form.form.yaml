
renderingOptions:
  submitButtonLabel: Submit
type: Form
identifier: telegram-order-form
label: 'Cocktail Pickup Order'
prototypeName: standard
finishers:
  -
    identifier: Telegram
    options:
      messageTemplate: "🍹 NEW COCKTAIL PICKUP ORDER!\n\n👤 Customer:\nName: {customer-name}\nPhone: {customer-phone}\n\n🍸 Order:\n{order-details}\n\n⏰ Time: {date}\n🌐 Website: {site}\n"
      debugMode: false
  -
    options:
      message: 'Thank you for your order! We will prepare your cocktails and call you when they are ready for pickup.'
    identifier: Confirmation
renderables:
  -
    renderingOptions:
      previousButtonLabel: 'Previous step'
      nextButtonLabel: 'Next step'
    type: Page
    identifier: order-page
    label: 'Pickup Information'
    renderables:
      -
        defaultValue: ''
        type: Text
        identifier: customer-name
        label: 'Your Name'
        properties:
          elementDescription: 'Please enter your full name'
          placeholder: 'John Smith'
        validators:
          -
            identifier: NotEmpty
            errorMessage: 'Name is required'
          -
            options:
              minimum: 2
              maximum: 100
            identifier: StringLength
            errorMessage: 'Name must be between 2 and 100 characters'
      -
        defaultValue: ''
        type: Telephone
        identifier: customer-phone
        label: 'Phone Number'
        properties:
          elementDescription: 'We will call you when your order is ready'
          placeholder: '+1234567890'
          fluidAdditionalAttributes:
            required: required
            autocomplete: tel
        validators:
          -
            identifier: NotEmpty
            errorMessage: 'Phone number is required'
      -
        defaultValue: ''
        type: Textarea
        identifier: order-details
        label: 'Order Details'
        properties:
          elementDescription: 'Tell us what cocktails you would like'
          placeholder: 'e.g., 2x Mojito, 1x Margarita...'
          rows: 2
        validators:
          -
            identifier: NotEmpty
            errorMessage: 'Please specify your order'
