type: Form
identifier: telegram-contact-form
label: 'Telegram Contact Form'
prototypeName: standard

renderables:
  -
    type: Page
    identifier: contact-page
    label: 'Contact Information'
    renderables:
      -
        type: Text
        identifier: name
        label: 'Your Name'
        properties:
          elementDescription: 'Please enter your full name'
          placeholder: 'John Smith'
        validators:
          -
            identifier: NotEmpty
            errorMessage: 'Name is required'
      -
        type: Telephone
        identifier: phone
        label: 'Phone Number'
        properties:
          elementDescription: 'We will call you back'
          placeholder: '+1234567890'
        validators:
          -
            identifier: NotEmpty
            errorMessage: 'Phone number is required'
          -
            identifier: RegularExpression
            options:
              regularExpression: '/^\+?[0-9]{10,15}$/'
            errorMessage: 'Please enter a valid phone number (10-15 digits, optional + prefix)'
      -
        type: Textarea
        identifier: message
        label: 'Your Message'
        properties:
          elementDescription: 'Tell us what you need'
          placeholder: 'Your message...'
          rows: 3
        validators:
          -
            identifier: NotEmpty
            errorMessage: 'Message is required'

finishers:
  -
    identifier: Telegram
    options:
      messageTemplate: |
        💬 <b>NEW ORDER</b>

        👤 {name}

        📱 {phone}

        {message}

        ⏰ {date}
      debugMode: false
  -
    identifier: Confirmation
    options:
      message: 'Biz siz bilan böglanamiz!'
