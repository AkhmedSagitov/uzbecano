<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<nav class="relative lg:hidden" data-main-menu>
    <button class="block text-amber-400 hover:text-amber-300 transition-colors duration-300" data-main-menu-open="wrapper">
        <f:render partial="Icon" arguments="{icon: 'bars-solid', class: 'fill-current size-8'}" />
    </button>
    <div data-main-menu-layer="wrapper" class="fixed inset-0 z-50 bg-gradient-to-b from-gray-900 to-indigo-950 translate-x-full transition-transform duration-300 [&.is-active]:translate-x-0">
        <button class="z-10 absolute top-4 right-4 text-amber-400 hover:text-amber-300 transition-colors duration-300" data-main-menu-close="wrapper">
            <f:render partial="Icon" arguments="{icon: 'xmark-solid', class: 'fill-current size-8'}" />
        </button>
        <div class="mt-16 px-6 py-4">
            <div class="flex items-center gap-3 mb-8 border-b border-amber-500/40 pb-4">
                <span class="text-3xl">🍸</span>
                <span class="text-xl font-bold text-amber-400">Menu</span>
            </div>
        </div>
        <ul class="border-t border-t-amber-500/40 max-h-[calc(100dvh-var(--spacing)*16)] overflow-auto">
            <f:for each="{mainMenu}" as="page">
                <f:render section="Submenu" arguments="{page: page}" />
            </f:for>
        </ul>
    </div>
</nav>

<f:section name="Submenu">
    <li class="">
        <f:if condition="{page.children}">
            <f:then>
                <button class="flex items-center w-full justify-between gap-2 p-4 border-b border-b-amber-500/30 text-amber-50 hover:text-amber-300 hover:bg-amber-500/10 transition-all duration-300" data-main-menu-open="{page.data.uid}">
                    <span>{page.title}</span>
                    <f:render partial="Icon" arguments="{icon: 'chevron-right-solid', class: 'fill-current size-4 text-amber-400'}" />
                </button>
                <div data-main-menu-layer="{page.data.uid}" class="absolute inset-0 bg-gradient-to-b from-gray-900 to-indigo-950 translate-x-full transition-transform duration-300 [&.is-active]:translate-x-0">
                    <button class="flex items-center w-[calc(100%-var(--spacing)*16)] gap-2 mt-2 p-4 text-amber-400 hover:text-amber-300 transition-colors duration-300" data-main-menu-close="{page.data.uid}">
                        <f:render partial="Icon" arguments="{icon: 'chevron-right-solid', class: 'fill-current size-4 rotate-180 text-amber-400'}" />
                        <span>Back</span>
                    </button>
                    <div class="overflow-auto max-h-[calc(100dvh-var(--spacing)*16)] border-t border-t-amber-500/40">
                        <f:link.page pageUid="{page.data.uid}" class="block px-4 py-4 border-b border-b-amber-500/30 font-bold text-xl text-amber-300 hover:text-amber-200 hover:bg-amber-500/10 transition-all duration-300">
                            {page.title}
                        </f:link.page>
                        <ul>
                            <f:for each="{page.children}" as="subpage">
                                <f:render section="Submenu" arguments="{page: subpage}" />
                            </f:for>
                        </ul>
                    </div>
                </div>
            </f:then>
            <f:else>
                <f:link.page pageUid="{page.data.uid}" class="block p-4 border-b border-b-amber-500/30 text-amber-50 hover:text-amber-300 hover:bg-amber-500/10 transition-all duration-300">
                    {page.title}
                </f:link.page>
            </f:else>
        </f:if>
    </li>
</f:section>
