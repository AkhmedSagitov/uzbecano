import:
  - ./config/deployer/hosts.yaml
  - ./vendor/deployer/deployer/recipe/common.php
  - ./vendor/deployer/deployer/contrib/rsync.php
  - ./vendor/leuchtfeuer/deployer-recipe/bundle.php

config:
  keep_releases: 3

tasks:
  deploy:
    - composer:install
    - npm:install
    - npm:build
    - deploy:setup
    - deploy:lock
    - deploy:release
    - sentry:release_file
    - rsync:warmup
    - rsync
    - deploy:shared
    - deploy:symlink
    - phpfpm:cache_clear
    - typo3:database_updateschema
    - typo3:cache_flush
    - typo3:install_fixfolderstructure
    - sentry:remote_release
    - deploy:unlock
    - deploy:cleanup
    - deploy:success

  reverse:
    - reverse:database_export
    - reverse:database_download
    - reverse:database_delete

after:
  deploy:failed: deploy:unlock
